name: supportsight_live
description: SupportSight Live — Multimodal incident support agent (Flutter UI)
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  flutter_sound: ^9.2.13
  image_picker: ^1.1.2
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  uuid: ^4.4.2
  flutter_markdown: ^0.7.3
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/
