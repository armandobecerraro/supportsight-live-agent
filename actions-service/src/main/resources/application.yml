server:
  port: 8091

spring:
  application:
    name: actions-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/supportsight}
    username: ${DB_USER:supportsight}
    password: ${DB_PASSWORD:supportsight}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: false

actions:
  api-key: ${ACTIONS_SERVICE_API_KEY:change-me}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  pattern:
    console: '{"time":"%d","level":"%p","logger":"%c{1}","msg":"%m"}%n'
