services:
  backend-orchestrator:
    build: 
      context: ./backend-orchestrator
      dockerfile: Dockerfile
    ports: ["8080:8080"]
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://supportsight:supportsight@postgres:5432/supportsight
      - REDIS_URL=redis://redis:6379/0
      - LOGS_SERVICE_URL=http://logs-service:8090
      - ACTIONS_SERVICE_URL=http://actions-service:8091
      - DEBUG=true
      - ENVIRONMENT=development
    env_file:
      - ./backend-orchestrator/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      logs-service:
        condition: service_healthy
      actions-service:
        condition: service_healthy
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"

  logs-service:
    build: 
      context: ./logs-service
      dockerfile: Dockerfile
    ports: ["8090:8090"]
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"

  actions-service:
    build: 
      context: ./actions-service
      dockerfile: Dockerfile
    ports: ["8091:8091"]
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/supportsight
      - DB_USER=supportsight
      - DB_PASSWORD=supportsight
      - DB_DRIVER=org.postgresql.Driver
      - ACTIONS_SERVICE_API_KEY=${ACTIONS_SERVICE_API_KEY:-change-me}
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8091/actions/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      backend-orchestrator:
        condition: service_healthy
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: supportsight
      POSTGRES_USER: supportsight
      POSTGRES_PASSWORD: supportsight
    ports: ["5432:5432"]
    volumes: [pg_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportsight -d supportsight"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: always

volumes:
  pg_data:
