name: CI — SupportSight Live

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Python Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install dependencies
        run: pip install -r backend-orchestrator/requirements.txt -r backend-orchestrator/requirements-dev.txt
        working-directory: .
      - name: Run tests
        run: GEMINI_API_KEY=test-key DEBUG=true pytest backend-orchestrator/tests/ -v
      - name: Lint
        run: python -m compileall backend-orchestrator/app/

  test-rust:
    name: Rust Log Parser Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-workdir: logs-service
      - name: Run tests
        run: cargo test
        working-directory: logs-service
      - name: Check clippy
        run: cargo clippy -- -D warnings
        working-directory: logs-service

  test-java:
    name: Java Actions Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Run tests
        run: mvn test -q
        working-directory: actions-service

  test-frontend:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install --legacy-peer-deps
        working-directory: frontend
      - run: npm run type-check
        working-directory: frontend

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Python safety check
        run: pip install safety && safety check -r backend-orchestrator/requirements.txt || true

  test-frontend-unit:
    name: Frontend Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - run: npm install --legacy-peer-deps
        working-directory: frontend
      - run: npm test
        working-directory: frontend
